replicaCount: 1
image:
  repository: ld5874123/note-research-team
  tag: 3c27ca3
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 5000
ingress:
  enabled: true
  className: "traefik"
  host: "research.local"
  path: /
  pathType: Prefix
  redirectHttps: true
  tls:
    enabled: true
    secretName: "research-tls"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi
