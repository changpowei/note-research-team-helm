research_task:
  description: >
    針對議題「{topic}」進行精準的網路搜索。
    
    **搜索要求：**
    1. 時間範圍：限定 近三年 的資料
    2. 數量限制：精選 10 篇最相關、最高品質的文獻
    3. 來源類型：包括學術論文、產業報告、技術文章、權威媒體報導
    4. 品質標準：優先選擇有數據支撐、有實例分析、有深度見解的內容
    
    你需要：
    - 使用關鍵字搜索相關文章和報告
    - 驗證發布日期在 系統時間的三年 內
    - 評估資料的可信度和深度
    - 精選出 10 篇最具代表性的文獻
    - 記錄每篇文獻的標題、來源連結、發布時間和核心重點
    
  expected_output: >
    包含 10 篇精選文獻的清單，每篇包含：
    - 標題
    - 來源 URL
    - 發布時間（需在 系統時間的三年 內）  
    - 核心重點摘要（2-3 句話）
    - 為何選擇這篇文獻的理由
    
  agent: researcher

organize_task:
  description: >
    將搜索到的資料進行分類和整理。
    
    請將資料按照主題分組，例如：
    - 基礎概念
    - 實作方式  
    - 進階技巧
    - 常見問題
    - 最佳實踐
    
    移除重複或低品質的資訊，保留最有價值的內容。
    
  expected_output: >
    一份經過分類整理的資料摘要，包含：
    - 清楚的主題分類
    - 每個分類下的重點資訊
    - 保留重要的資料來源連結
    
  agent: researcher
  context:
    - research_task

write_and_publish_task:
  description: >
    根據研究員提供的資料，撰寫一篇結構完整、邏輯清晰的深度筆記，
    並發佈到 Notion。
    
    ## ⚠️ 重要格式要求
    
    **禁止項目（以下內容不要出現）：**
    - ❌ 不要在內容開頭寫文章主標題（H1 # 標題）
    - ❌ 不要生成文字版目錄（如「## 目錄」或章節清單）
    - ❌ 不要重複 Notion 頁面標題
    
    **原因：**
    - Notion 頁面已有標題，不需要在內容中重複
    - Notion 會自動生成 Table of Contents，不需要文字目錄
    
    ## ✅ 正確的內容結構
    
    1. **引言段落**（## 背景）
       - 使用 H2 標題「## 背景」或「## 概述」
       - 2-3 段文字（200-300字）
       - 介紹主題背景、重要性、文章涵蓋範圍
    
    2. **主體章節**（使用 ## H2 標題）
       - 3-5 個章節，每章節 300-500 字
       - 包含數據、案例、深入分析
       - 段落間有邏輯過渡句
       - 適當使用 **粗體** 強調關鍵詞
    
    3. **結論段落**（## 總結）
       - 150-200字
       - 總結核心觀點
       - 提出見解或未來展望
    
    4. **參考資料**（## 參考資料）
       - 每個來源格式：[標題](URL)
       - 按重要性排序
    
    ## 寫作風格
    
    - 專業、客觀、易讀
    - 連貫的敘事，非羅列式拼湊
    - 避免過度術語，必要時解釋
    - 全文繁體中文
    
    主題：{topic}
    
    撰寫完成後使用 Notion tool 發佈到「CrewAI筆記」。
    
  expected_output: >
    一篇完整的 Markdown 格式筆記（不含文章標題和文字目錄），包含：
    - 引言段落（## 背景 或 ## 概述）
    - 3-5個主體章節（## H2）
    - 結論（## 總結）
    - 參考資料（## 參考資料，含超連結）
    - Notion 發佈成功確認
    
  agent: note_writer
  context:
    - organize_task

